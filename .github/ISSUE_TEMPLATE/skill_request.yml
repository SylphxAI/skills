name: Skill request
description: Propose a new skill or a material gap in an existing one
title: "[skill] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We accept skills that encode a **recurring job** with a **concrete artifact**. Generic prompts and duplicates of existing packages will be closed. Prefer improving an existing skill when possible — browse [`skills/`](https://github.com/SylphxAI/skills/tree/main/skills).
  - type: input
    id: job
    attributes:
      label: Independent job
      description: One sentence — what decision or artifact does this produce?
    validations:
      required: true
  - type: textarea
    id: when
    attributes:
      label: When it should load
      description: Triggers and non-triggers (what should load a different skill instead)
    validations:
      required: true
  - type: textarea
    id: existing
    attributes:
      label: Related existing skills
      description: Links or names you already checked
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Domain constraints, risk level, or example outcomes
    validations:
      required: false
