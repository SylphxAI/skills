name: Validate skills

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/generate-registry.mjs
      - run: git diff --exit-code registry/skills.json
      - run: node scripts/validate-skills.mjs --check-registry
