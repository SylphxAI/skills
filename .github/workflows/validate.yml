name: Validate skills

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/generate-registry.mjs
      - run: node scripts/generate-catalog.mjs
      - run: git diff --exit-code registry/skills.json catalog
      - run: node scripts/validate-skills.mjs --check-registry
      - run: node scripts/validate-evals.mjs
      - run: node scripts/validate-catalog.mjs
      - run: node scripts/validate-reference-quality.mjs
      - run: node scripts/validate-behavior-examples.mjs
      - run: node scripts/validate-launch-kit.mjs
      - run: node scripts/validate-benchmarks.mjs
      - run: node scripts/validate-benchmark-output-safety.mjs
      - run: node scripts/validate-benchmark-claims.mjs
      - run: node scripts/validate-sota-evidence.mjs
      - run: node scripts/generate-catalog.mjs --check
