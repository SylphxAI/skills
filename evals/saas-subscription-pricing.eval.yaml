skill: saas-subscription-pricing
positive_prompts:
  - "Design pricing tiers for a B2B SaaS with usage-based costs and team collaboration."
  - "Review this pricing page for trial, cancellation, downgrade, and enterprise readiness issues."
negative_prompts:
  - "Explain how binary search works."
expected_behavior:
  - "Identifies buyer, value metric, cost driver, and expansion path."
  - "Covers trial/freemium/tiers/usage/enterprise tradeoffs."
  - "Defines exact limits, overage mechanics, caps, and alert thresholds when usage-based pricing is requested."
  - "Includes gross margin, CAC payback, NRR, cost controls, and abuse guardrails."
  - "Includes support/sales enablement, objection handling, procurement path, and escalation rules."
  - "Includes cancellation, downgrade, renewal, metrics, and trust concerns."
  - "Includes experiment or staged rollout, grandfathering, customer communications, guardrails, and rollback triggers."
